{% extends 'base.html' %}

{% block content %}
    <div class="rpg-container">
        <div class="rpg-panel" style="max-width: 800px; margin: 50px auto;">
            <h1 class="panel-title">
                <img src="/static/images/icons/actions/cast-spell.svg" alt="" class="rpg-icon rpg-icon-lg rpg-icon-primary">
                {% if object %}Edit NPC{% else %}New NPC{% endif %}
            </h1>
            <div class="text-center mb-2">
                <a href="{{ campaign.get_absolute_url }}" style="color: var(--color-primary); text-decoration: underline;">Return to {{ campaign }}</a>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="rpg-form-group">
                    {{ form.as_p }}
                </div>
                <div class="action-buttons mt-2">
                    <button class="rpg-btn btn-primary" type="submit">
                        {% if object %}Save Changes{% else %}Create NPC{% endif %}
                    </button>
                    <a href="{{ campaign.get_absolute_url }}" class="rpg-btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
